name: CI CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -B -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -B -m compileall -q .

      - name: Validate Compose model
        run: IMAGE_TAG=ci docker compose -f compose.yaml config --quiet

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - web-agent
          - item-service
          - claim-service
          - handover-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs:
      - test
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64, compose-local]
    environment: compose-local
    concurrency:
      group: compose-local-production
      cancel-in-progress: false
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to local Docker Desktop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./scripts/Deploy-Compose.ps1 -Sha '${{ github.sha }}'
